ingress:
  hostnames:
    - inferno.sparked-fhir.com
    - inferno.hl7.org.au

redirectIngress:
  enabled: true
  hostnames:
    - dev.inferno.sparked-fhir.com
    - inferno.dev.hl7.org.au
  targetUrl: "https://inferno.hl7.org.au"

inferno:
  imageUrl: ghcr.io/hl7au/au-fhir-inferno:213f6c898b0b059a86a477f68f2248b926bea4d0
  usesWrapper: true
  # Pinned to match the version dev has soaked on (dev tracks :latest, currently 1.0.78 /
  # core 6.9.7). 1.0.78 adds a ReentrantLock + cooldown around the heap-pressure engine
  # reload that 1.0.68 lacked (1.0.68 rebuilt the whole ValidationService — wiping the
  # session cache — on ANY request seeing free heap under the ~238MB default threshold,
  # with no cooldown), and ships a newer org.hl7.fhir.core. Prod stays pinned (never
  # :latest) so promotions are explicit; bump this tag to adopt a newer soaked version.
  validatorImageUri: markiantorno/validator-wrapper:1.0.78

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

nginx:
  platformImageUri: ghcr.io/hl7au/au-fhir-inferno:213f6c898b0b059a86a477f68f2248b926bea4d0-nginx


externalSecrets:
  enabled: true
  roleArn: arn:aws:iam::471112546300:role/prod-inferno-external-secrets-sa
  secretArn: arn:aws:secretsmanager:ap-southeast-2:471112546300:secret:rds!db-4a252b41-3b6b-475b-9b8c-161589839fe3-QZ8sT1
  username: postgres
  region: ap-southeast-2

postgresql:
  externaldbhost: prod-inferno-postgresql.creaskuwcgs3.ap-southeast-2.rds.amazonaws.com
  global:
    postgresql:
      auth:
        database: inferno

# Cap voluntary disruption (Karpenter consolidation, node drain) to one pod at a time
# for each replicated workload: worker and nginx run 2 replicas, redirect-nginx runs 2,
# and inferno-app autoscales 1 to 6. maxUnavailable of 1 is permissive at 1 replica and
# protective above it, and never blocks consolidation. inferno-redis and validator-api
# are deliberately omitted: they are singletons whose protection is on-demand pinning,
# not a no-op PDB.
podDisruptionBudgets:
  - app: inferno-app
  - app: inferno-worker
  - app: nginx-app
  - app: redirect-nginx
