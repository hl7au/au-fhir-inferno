apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: inferno-alerts
  namespace: {{ .Values.namespace }}
  labels:
    app: inferno
spec:
  groups:
    - name: inferno.cpu
      rules:
        - alert: HighCPUThrottling
          expr: |
            (
              sum by (pod, container, namespace) (rate(container_cpu_cfs_throttled_periods_total{namespace="{{ .Values.namespace }}", container!=""}[5m]))
              /
              sum by (pod, container, namespace) (rate(container_cpu_cfs_periods_total{namespace="{{ .Values.namespace }}", container!=""}[5m]))
            ) * 100 > 25
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU throttling on {{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}}"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} is being throttled {{`{{ printf \"%.1f\" $value }}`}}% of the time for over 5 minutes."

        - alert: CriticalCPUThrottling
          expr: |
            (
              sum by (pod, container, namespace) (rate(container_cpu_cfs_throttled_periods_total{namespace="{{ .Values.namespace }}", container!=""}[5m]))
              /
              sum by (pod, container, namespace) (rate(container_cpu_cfs_periods_total{namespace="{{ .Values.namespace }}", container!=""}[5m]))
            ) * 100 > 75
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical CPU throttling on {{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}}"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} is being throttled {{`{{ printf \"%.1f\" $value }}`}}% of the time for over 5 minutes. Immediate action required."

    - name: inferno.memory
      rules:
        - alert: HighMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace="{{ .Values.namespace }}", container!=""}
              /
              container_spec_memory_limit_bytes{namespace="{{ .Values.namespace }}", container!=""}
            ) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}}"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} is using {{`{{ printf \"%.1f\" $value }}`}}% of its memory limit. OOM kill risk."

        - alert: CriticalMemoryUsage
          expr: |
            (
              container_memory_working_set_bytes{namespace="{{ .Values.namespace }}", container!=""}
              /
              container_spec_memory_limit_bytes{namespace="{{ .Values.namespace }}", container!=""}
            ) * 100 > 95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "OOM imminent on {{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}}"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} is using {{`{{ printf \"%.1f\" $value }}`}}% of its memory limit. OOM kill is imminent."

        - alert: ContainerOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{namespace="{{ .Values.namespace }}", reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Container OOM killed: {{`{{ $labels.pod }}`}}/{{`{{ $labels.container }}`}}"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} was OOM killed."
