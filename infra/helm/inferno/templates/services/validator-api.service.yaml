apiVersion: v1
kind: Service
metadata:
  name: validator-api
  namespace: {{ .Release.Namespace }}
spec:
  # validator-api is a single-pod Deployment, so there is exactly one endpoint — no
  # session affinity needed (and none possible/useful across pods); a new pod is picked
  # up automatically. The per-pod, in-memory session cache cannot be shared, which is why
  # the validator is a singleton. See docs/VALIDATOR_OPTIMIZATION.md.
  type: NodePort
  ports:
    - port: 3500
      protocol: TCP
      targetPort: 3500
  selector:
    app: validator-api
