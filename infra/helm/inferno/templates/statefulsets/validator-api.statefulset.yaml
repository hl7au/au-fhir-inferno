apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validator-api
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: validator-api  # Required for StatefulSet
  replicas: {{ .Values.validator.replicas | default 2 }}
  selector:
    matchLabels:
      app: validator-api
  template:
    metadata:
      labels:
        app: validator-api
      annotations:
        instrumentation.opentelemetry.io/inject-java: "monitoring/auto-instrumentation"
    spec:
      securityContext:
        fsGroup: 1000  # Ensures volumes are writable by ktor user (UID 1000)
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: on-demand  # prod: avoid spot-reclamation churn disrupting test runs (redis already pinned)
      volumes:
      - name: validator-presets
        configMap:
          name: validator-presets
      containers:
      - name: validator-api
        image: {{ .Values.inferno.validatorImageUri }}
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.validator.javaOpts | default "-Xmx8g" | quote }}
        - name: VALIDATION_SERVICE_PRESETS_FILE_PATH
          value: "/presets/presets.json"
        # Keep warm validator sessions alive across idle gaps instead of letting the
        # wrapper's 60-min expire-after-access default silently evict them (which forces
        # a ~50s cold engine rebuild on the first validation of a later run). See the
        # validator.sessionCache* notes in values.yaml. size is memory-bound — each
        # cached engine is large and these pods run close to the 12Gi limit.
        - name: SESSION_CACHE_DURATION
          value: {{ .Values.validator.sessionCacheDuration | default -1 | quote }}
        - name: SESSION_CACHE_SIZE
          value: {{ .Values.validator.sessionCacheSize | default 6 | quote }}
        ports:
        - containerPort: 3500
        volumeMounts:
        - name: fhir-package-cache
          mountPath: /home/ktor/.fhir/packages
          subPath: packages  # Avoid EXT4 lost+found directory
        - name: terminology-cache
          mountPath: /tmp/default-tx-cache
          subPath: cache  # Avoid EXT4 lost+found directory
        - name: validator-presets
          mountPath: /presets
          readOnly: true
        # Defaults (values.yaml) sized for dev/prod: request is memory-driven (10Gi) onto
        # 2-4 vCPU r-family nodes; cpu limit 3000m is a burst ceiling (validations are
        # CPU-bound and starved the health endpoint at 2000m), request stays 1000m. Load
        # test: one warm pod handles 10 concurrent at ~2.0/3 cores, mem flat ~9.5Gi. Preview
        # overrides these much lower (see the inferno-previews ApplicationSet).
        resources:
          {{- toYaml .Values.validator.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10      # Increased from 3s - allow time during preset loading
          successThreshold: 1
          failureThreshold: 6     # Increased from 3 - allows 30s (6*5) before marking unready
        livenessProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 30      # baseEngine generateSnapshot() saturates Ktor threads; a single
                                  # validation can run ~160s and block the health endpoint
          failureThreshold: 10    # allows 300s (10*30) before restart - covers a full validation/preset
                                  # load so a busy (not wedged) validator is not killed mid-session
  volumeClaimTemplates:
  - metadata:
      name: fhir-package-cache
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.validator }}
      {{- if .Values.validator.storageClassName }}
      storageClassName: {{ .Values.validator.storageClassName }}
      {{- end }}
      {{- end }}
      resources:
        requests:
          storage: 5Gi
  - metadata:
      name: terminology-cache
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.validator }}
      {{- if .Values.validator.storageClassName }}
      storageClassName: {{ .Values.validator.storageClassName }}
      {{- end }}
      {{- end }}
      resources:
        requests:
          storage: 2Gi
