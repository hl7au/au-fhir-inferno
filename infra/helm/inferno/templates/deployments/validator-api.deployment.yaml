# Single-pod validator. The validator-wrapper keeps per-pod, in-memory session state
# (a built ValidationEngine keyed by a session id Inferno reuses) and cannot share that
# cache across pods, so it runs as a singleton (replicas: 1) — see
# docs/VALIDATOR_OPTIMIZATION.md. As a singleton it is a Deployment, not a StatefulSet:
# one pod means the plain validator-api Service has a single endpoint (no cross-pod
# thrash, automatic failover when the pod is replaced) with no pod-pinning needed, and
# Deployment avoids the StatefulSet at-most-one reschedule stall on node loss.
#
# strategy: Recreate — the package/terminology caches are RWO PVCs, so the old pod must
# release them before the new one mounts; Recreate terminates first (no multi-attach).
# Updates have a brief gap, which is fine for a singleton (a fresh pod cold-starts anyway).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.validator.replicas | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: validator-api
  template:
    metadata:
      labels:
        app: validator-api
      annotations:
        instrumentation.opentelemetry.io/inject-java: "monitoring/auto-instrumentation"
        # Roll the pod when the presets ConfigMap changes — the wrapper reads presets.json
        # only at startup, so a ConfigMap edit alone would not take effect otherwise.
        checksum/presets: {{ include (print $.Template.BasePath "/configs/validator-presets-configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 1000  # Ensures volumes are writable by ktor user (UID 1000)
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: on-demand  # stable nodes: avoid spot-reclamation churn disrupting test runs
      affinity:
        # The validator is the heaviest pod we run (multi-GB JVM heap, ~9.5Gi resident).
        # Never put two validators on the same node: when two warm up together their real
        # usage can exceed the node's RAM and hard-freeze the kubelet (an OOM wedge took a
        # node down on 2026-06-23 when two preview validators co-located on one m6a.xlarge).
        # One validator per node, cluster-wide (dev/prod/each preview namespace).
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: validator-api
            topologyKey: kubernetes.io/hostname
      volumes:
      - name: validator-presets
        configMap:
          name: validator-presets
      - name: fhir-package-cache
        persistentVolumeClaim:
          claimName: validator-fhir-package-cache
      - name: terminology-cache
        persistentVolumeClaim:
          claimName: validator-terminology-cache
      {{- if .Values.warmer.enabled }}
      - name: validator-warmer
        configMap:
          name: validator-warmer
      {{- end }}
      containers:
      - name: validator-api
        image: {{ .Values.inferno.validatorImageUri }}
        imagePullPolicy: Always
        env:
        - name: JAVA_TOOL_OPTIONS
          value: {{ .Values.validator.javaOpts | default "-Xmx8g" | quote }}
        - name: VALIDATION_SERVICE_PRESETS_FILE_PATH
          value: "/presets/presets.json"
        # Keep warm validator sessions alive across idle gaps instead of letting the
        # wrapper's 60-min expire-after-access default silently evict them (which forces
        # a ~50s cold engine rebuild on the first validation of a later run). See the
        # validator.sessionCache* notes in values.yaml. size is memory-bound — each
        # cached engine is large and these pods run close to the 12Gi limit.
        - name: SESSION_CACHE_DURATION
          value: {{ .Values.validator.sessionCacheDuration | default -1 | quote }}
        - name: SESSION_CACHE_SIZE
          value: {{ .Values.validator.sessionCacheSize | default 6 | quote }}
        ports:
        - containerPort: 3500
        volumeMounts:
        - name: fhir-package-cache
          mountPath: /home/ktor/.fhir/packages
          subPath: packages  # Avoid EXT4 lost+found directory
        - name: terminology-cache
          mountPath: /tmp/default-tx-cache
          subPath: cache  # Avoid EXT4 lost+found directory
        - name: validator-presets
          mountPath: /presets
          readOnly: true
        # Defaults (values.yaml) sized for dev/prod: request is memory-driven (10Gi) onto
        # 2-4 vCPU r-family nodes; cpu limit 3000m is a burst ceiling (validations are
        # CPU-bound and starved the health endpoint at 2000m), request stays 1000m. Load
        # test: one warm pod handles 10 concurrent at ~2.0/3 cores, mem flat ~9.5Gi. Preview
        # overrides these much lower (see the inferno-previews ApplicationSet).
        resources:
          {{- toYaml .Values.validator.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 10      # Increased from 3s - allow time during preset loading
          successThreshold: 1
          failureThreshold: 6     # Increased from 3 - allows 30s (6*5) before marking unready
        livenessProbe:
          httpGet:
            path: /
            port: 3500
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 30      # baseEngine generateSnapshot() saturates Ktor threads; a single
                                  # validation can run ~160s and block the health endpoint
          failureThreshold: 10    # allows 300s (10*30) before restart - covers a full validation/preset
                                  # load so a busy (not wedged) validator is not killed mid-session
      {{- if .Values.warmer.enabled }}
      # Session warmer sidecar (files/warmer.py). After a validator restart it pre-builds
      # the per-suite validator session engines THROUGH INFERNO (au_ps bundle; au_core
      # v1/v2 via the capability-statement group) so the first real user never pays the
      # cold engine build. Validator sessions never time-expire, so it warms once on start
      # then re-warms only when the co-located validator restarts (localhost unreachable
      # -> reachable), covering whole-pod and container-only restarts.
      #
      # Fully decoupled from the validator: the command wraps the script with
      # `|| true; sleep infinity` so an import/syntax error cannot crashloop it; the script
      # itself swallows all errors and never exits; it has no probes and never gates the
      # validator container. A warmer bug or an Inferno/AU-Core-server outage therefore
      # cannot affect the validator's boot or availability.
      - name: session-warmer
        image: {{ .Values.warmer.image | default "python:3.12-slim" | quote }}
        command:
        - /bin/sh
        - -c
        - 'python3 /warmer/warmer.py || true; echo "[warmer] entrypoint exited; idling"; sleep infinity'
        env:
        - name: INFERNO_URL
          value: {{ .Values.warmer.infernoUrl | default "http://inferno:4567" | quote }}
        - name: VALIDATOR_URL
          value: "http://localhost:3500"
        - name: AUCORE_SERVER_URL
          value: {{ .Values.warmer.aucoreServerUrl | quote }}
        - name: AU_CORE_SUITES
          value: {{ .Values.warmer.auCoreSuites | default "au_core_v100,au_core_v200" | quote }}
        - name: AU_PS_SUITE_ID
          value: {{ .Values.warmer.auPsSuiteId | default "suite_100preview" | quote }}
        - name: AU_PS_PROFILE
          value: {{ .Values.warmer.auPsProfile | default "http://hl7.org.au/fhir/ps/StructureDefinition/au-ps-bundle" | quote }}
        - name: BUNDLE_PATH
          value: /warmer/warmer-bundle.json
        - name: POLL_TIMEOUT
          value: {{ .Values.warmer.pollTimeout | default 300 | quote }}
        - name: RECHECK_INTERVAL
          value: {{ .Values.warmer.recheckInterval | default 30 | quote }}
        volumeMounts:
        - name: validator-warmer
          mountPath: /warmer
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "250m"
      {{- end }}
