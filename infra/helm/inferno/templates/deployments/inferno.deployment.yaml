apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno-app
  namespace: {{ .Release.Namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.inferno.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      app: inferno-app
  template:
    metadata:
      labels:
        app: inferno-app
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: on-demand  # prod: avoid spot-reclamation churn disrupting test runs (redis already pinned)
      volumes:
        - name: examplenginx-config
          configMap:
            name: nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf
      initContainers:
      - name: run-migrations
        image: {{ .Values.inferno.imageUrl }}
        imagePullPolicy: Always
        command: ["bundle", "exec", "rake", "db:migrate"]
        env:
          - name: TX_SERVER_URL
            value: {{ .Values.inferno.terminologyServer }}
        envFrom:
        - configMapRef:
            name: inferno
        - configMapRef:
            name: postgresql-configmap
        - secretRef:
            name: postgresql-secret
      containers:
      - name: inferno-app
        image: {{ .Values.inferno.imageUrl }}
        imagePullPolicy: Always
        ports:
          - containerPort: 4567
        env:
          - name: TX_SERVER_URL
            value: {{ .Values.inferno.terminologyServer }}
        envFrom:
        - configMapRef:
            name: inferno
        - configMapRef:
            name: postgresql-configmap
        - secretRef:
            name: postgresql-secret
        resources:
          requests:
            # Memory right-sized from the Sparked event (07-01..09): inferno-app
            # peaked 366Mi (prod), 350Mi (dev) and 228-348Mi across ~5 preview
            # envs, vs the old 2Gi request (~5.5x over). This block is shared by
            # every env, so the saving multiplies across all preview namespaces.
            memory: "768Mi"
            cpu: "1000m"
          limits:
            memory: "1536Mi"
            cpu: "2000m"
# CPU (not memory) gates session-build latency, so it is left unchanged:
# at 512Mi and 100m CPU takes 30sec to create new session
# at 2Gi and 1000m CPU takes 9sec to create new session
      - name: nginx
        image: {{ .Values.nginx.platformImageUri }}
        imagePullPolicy: Always
        ports:
          - containerPort: 80
        volumeMounts:
          - name: examplenginx-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
        resources:
          requests:
            memory: "32Mi"    # Actual usage: ~3Mi
            cpu: "25m"        # Actual usage: ~1m
          limits:
            memory: "64Mi"    # Nginx is very lightweight
            cpu: "50m"        # Minimal CPU needed for reverse proxy