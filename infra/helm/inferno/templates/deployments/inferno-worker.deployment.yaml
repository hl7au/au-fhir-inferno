apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno-worker
  namespace: {{ .Release.Namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ .Values.inferno.workerReplicas | default 2 }}
  selector:
    matchLabels:
      app: inferno-worker
  template:
    metadata:
      labels:
        app: inferno-worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: on-demand  # prod: avoid spot-reclamation churn disrupting test runs (redis already pinned)
      containers:
      - name: inferno-worker
        image: {{ .Values.inferno.imageUrl }}
        command: ["bundle", "exec", "sidekiq", "-r", "./worker.rb"]
        imagePullPolicy: Always
        env:
        - name: OTEL_SERVICE_NAME
          value: "inferno-worker"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://k8s-monitoring-alloy-metrics.monitoring.svc:4318"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        envFrom:
        - configMapRef:
            name: inferno
        - configMapRef:
            name: postgresql-configmap
        - secretRef:
            name: postgresql-secret
        resources:
          requests:
            # Sparked event (07-01..09): the worker climbs and plateaus (Sidekiq
            # retained heap, never released to the OS), reaching ~954Mi (prod) and
            # ~805Mi (dev) and holding for ~2 days at 93% of the old 1Gi limit
            # (44h above 80%). Not an unbounded leak, but no headroom. VPA 1168Mi.
            memory: "768Mi"  # was 512Mi; steady plateau ~954Mi
            cpu: "500m"       # actual usage <10m, peaks at 352m
          limits:
            memory: "1536Mi"  # was 1Gi; clears the ~954Mi plateau
            cpu: "1000m"