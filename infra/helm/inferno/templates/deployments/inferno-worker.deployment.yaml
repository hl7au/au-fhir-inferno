apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferno-worker
  namespace: {{ .Values.namespace }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ .Values.inferno.workerReplicas | default 2 }}
  selector:
    matchLabels:
      app: inferno-worker
  template:
    metadata:
      labels:
        app: inferno-worker
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        karpenter.sh/capacity-type: on-demand  # prod: avoid spot-reclamation churn disrupting test runs (redis already pinned)
      containers:
      - name: inferno-worker
        image: {{ .Values.inferno.imageUrl }}
        command: ["bundle", "exec", "sidekiq", "-r", "./worker.rb"]
        imagePullPolicy: Always
        env:
        - name: OTEL_SERVICE_NAME
          value: "inferno-worker"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://k8s-monitoring-alloy-metrics.monitoring.svc:4318"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        envFrom:
        - configMapRef:
            name: inferno
        - configMapRef:
            name: postgresql-configmap
        - secretRef:
            name: postgresql-secret
        resources:
          requests:
            memory: "512Mi"   # Actual usage: ~485Mi
            cpu: "500m"       # Down from 250m - actual usage <10m, peaks at 52m
          limits:
            memory: "1Gi"   
            cpu: "1000m"