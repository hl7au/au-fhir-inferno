# Render the destination Namespace as a managed resource so ArgoCD prunes it on
# teardown. Preview environments set this true; dev/prod leave it false and use their
# pre-existing namespaces. See templates/namespace.yaml.
createNamespace: false

ingress:
  hostnames:
    - example.inferno.sparked-fhir.com
    - example.inferno.hl7.org.au

redirectIngress:
  enabled: false
  hostnames: []
  targetUrl: ""

inferno:
  # Always overridden per-environment in values-{dev,prod}.yaml (dev by CI, prod by the
  # promotion PR). This placeholder just avoids carrying a stale, real-looking SHA here.
  imageUrl: "ghcr.io/hl7au/au-fhir-inferno:overridden-per-environment"
  terminologyServer: "https://tx.dev.hl7.org.au/fhir"
  externalValidatorUrl: null  # This can be overridden during chart deployment
  validatorImageUri: "markiantorno/validator-wrapper:1.0.78"
  # Performance monitoring (request/validator timing + /performance page + its DB
  # migration). Dev-only feature; OFF by default, enabled per-env in values-dev.yaml.
  performanceMonitoring: false

validator:
  storageClassName: "gp3-encrypted"  # Use default EBS storage class for validator caches
  # Validator session cache (env: SESSION_CACHE_DURATION / SESSION_CACHE_SIZE on the
  # validator-wrapper). A "session" is a fully-built ValidationEngine keyed by a random
  # UUID; Inferno reuses the UUID it gets back so all bundles/users in a run share one
  # engine. The wrapper default is 60-min expire-after-access, which silently evicts
  # warm sessions during idle gaps — so the first validation of any run that lands more
  # than an hour after warmup pays the full ~50s cold rebuild (confirmed in prod).
  #
  # duration < 0 disables time-based expiry (sessions kept until LRU-evicted). size is
  # the max number of resident engines (LRU). Each engine is large (loads ~20+ IG/tx
  # packages), so size is memory-bound: the pod sits ~9.4Gi/12Gi at idle, so raise size
  # only with headroom and watch RSS. The shared validator boot-warms one session per
  # registered suite — dev warms ~5 distinct contexts (AU PS preview, AU Core
  # 1.0.0-ballot/1.0.0/2.0.0, smart-app-launch) — so size must clear that working set
  # plus headroom, else LRU (now the only eviction path) re-introduces cold starts.
  # Each resident engine is a full build (~80-150Mi); 8 covers the 5 contexts + spare.
  sessionCacheDuration: -1
  sessionCacheSize: 8
  # Singleton: the session cache is per-pod and in-memory, so the validator runs as a
  # single-pod Deployment (a 2nd replica can't share the cache and would only thrash it).
  # A standby gives no benefit either — it can't be warm for the one session id Inferno
  # reuses, so failover cold-rebuilds regardless. The plain validator-api Service has one
  # endpoint and auto-fails-over when the pod is replaced; pods run on on-demand (stable)
  # nodes so reschedule is reliable. Raising this above 1 reintroduces cross-pod thrash.
  replicas: 1
  # JVM heap. Must fit the loaded IG/terminology context; preview overrides it lower.
  javaOpts: "-Xmx8g"
  # Pod resources. Defaults sized for dev/prod (load-tested: one warm pod serves 10
  # concurrent at ~2.0/3 cores, ~9.5Gi mem). Preview overrides these much lower.
  resources:
    requests:
      memory: "10Gi"
      cpu: "1000m"
    limits:
      memory: "12Gi"
      cpu: "3000m"

# NOTE: validator autoscaling (HPA) was removed. It does not fit this validator: each
# session is per-pod in-memory state, so scaling out splits one logical session across
# pods and thrashes the cache (every validation cold-rebuilds ~50s). The validator runs
# as a single-pod Deployment (validator.replicas: 1); scale UP (resources), not out.
# For a known high-load event, raise validator.resources rather than replicas.
# See docs/VALIDATOR_OPTIMIZATION.md.

# Validator session warmer. Runs as a SIDECAR in the validator pod
# (deployments/validator-api.deployment.yaml mounts the configs/validator-warmer-configmap
# script), NOT as a CronJob. Validator sessions never time-expire
# (SESSION_CACHE_DURATION=-1), so warming is only needed after a validator restart — the
# sidecar warms once on start and re-warms when the co-located validator restarts, with no
# steady-state timer. It warms THROUGH INFERNO (a self-warm on the validator builds a
# throwaway session that real runs don't reuse): au_ps via a pasted bundle, and au_core
# v1/v2 via each suite's capability-statement group (needs only `url`, one validation
# builds the engine). See files/warmer.py and VALIDATOR_OPTIMIZATION.md.
#
# The sidecar can never affect the validator: its command is wrapped with
# `|| true; sleep infinity`, the script swallows all errors and never exits, and it has no
# probes — so a warmer bug or an Inferno/AU-Core-server outage cannot block the validator's
# boot or readiness.
warmer:
  enabled: true
  image: "python:3.12-slim"
  infernoUrl: "http://inferno:4567"    # in-cluster; /suites proxies here
  # Live AU Core endpoint the capability-statement warm runs against (external dependency;
  # only hit on startup + after a restart).
  aucoreServerUrl: "https://fhir.hl7.org.au/aucore/fhir/DEFAULT"
  auCoreSuites: "au_core_v100,au_core_v200"
  auPsSuiteId: "suite"
  auPsProfile: "http://hl7.org.au/fhir/ps/StructureDefinition/au-ps-bundle"
  pollTimeout: 300      # max seconds to wait for a warm run to finish
  recheckInterval: 30   # seconds between (cheap, local) validator-restart checks

postgresql:
  enabled: false # enable if not using rds from aws-impl
  externaldbhost: null # This can be overridden during chart deployment
  # Bitnami purged versioned tags from docker.io/bitnami (mid-2025) and moved them
  # to the bitnamilegacy archive, so the subchart's pinned default tag 404s. Point
  # the in-namespace Postgres (preview envs only — dev/prod use RDS) at the archive.
  # Stopgap: bitnamilegacy receives no updates and will eventually be removed; revisit
  # by bumping/replacing the postgresql subchart.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
  containerPorts:
    postgresql: 5432
  global:
    postgresql:
      auth:
        username: "postgres"
        password: "password"
        database: "inferno"
