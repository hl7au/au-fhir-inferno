ingress:
  hostnames:
    - development.inferno.sparked-fhir.com

inferno:
  imageUrl: ghcr.io/hl7au/au-fhir-inferno:94bb601d413cb3a4b6e5640ff0944e9255a51295
  usesWrapper: true
  validatorImageUri: markiantorno/validator-wrapper:latest
  replicas: 1
  workerReplicas: 1
  performanceMonitoring: true

validator:
  replicas: 1
  storageClassName: "gp3-encrypted"
  # Dev-only memory reclaim. During the Sparked event dev validator peaked
  # 8.9Gi early (07-01/02) then settled to a 2.7-4.5Gi baseline for the rest of
  # the window, so the base 10Gi request over-reserves ~4Gi here. Lower the
  # request to cover the baseline and let the (unchanged) 12Gi limit absorb the
  # occasional warm-cache burst burstably. Heap (-Xmx8g) is left alone so a real
  # heavy dev validation still has room; this is a deliberate dev-only
  # over-commit tradeoff, not applied to prod (prod peaked 9.4Gi, keeps 10Gi).
  resources:
    requests:
      memory: "6Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

nginx:
  platformImageUri: ghcr.io/hl7au/au-fhir-inferno:94bb601d413cb3a4b6e5640ff0944e9255a51295-nginx


externalSecrets:
  enabled: true
  roleArn: arn:aws:iam::471112546300:role/dev-inferno-external-secrets-sa
  secretArn: arn:aws:secretsmanager:ap-southeast-2:471112546300:secret:rds!db-ed54d45e-936a-4cf0-bdbb-9356864d6670-3FhA4J
  username: postgres
  region: ap-southeast-2

postgresql:
  externaldbhost: dev-inferno-postgresql.creaskuwcgs3.ap-southeast-2.rds.amazonaws.com
  global:
    postgresql:
      auth:
        database: inferno