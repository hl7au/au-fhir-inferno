ingress:
  hostnames:
    - development.inferno.sparked-fhir.com

inferno:
  imageUrl: ghcr.io/hl7au/au-fhir-inferno:0e151a206378d921fdebbe653db08a326f5a70ac
  usesWrapper: true
  validatorImageUri: markiantorno/validator-wrapper:latest
  replicas: 1
  workerReplicas: 1
  performanceMonitoring: true

validator:
  replicas: 1
  storageClassName: "gp3-encrypted"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

validatorAutoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

nginx:
  platformImageUri: ghcr.io/hl7au/au-fhir-inferno:0e151a206378d921fdebbe653db08a326f5a70ac-nginx


externalSecrets:
  enabled: true
  roleArn: arn:aws:iam::471112546300:role/dev-inferno-external-secrets-sa
  secretArn: arn:aws:secretsmanager:ap-southeast-2:471112546300:secret:rds!db-ed54d45e-936a-4cf0-bdbb-9356864d6670-3FhA4J
  username: postgres
  region: ap-southeast-2

postgresql:
  externaldbhost: dev-inferno-postgresql.creaskuwcgs3.ap-southeast-2.rds.amazonaws.com
  global:
    postgresql:
      auth:
        database: inferno