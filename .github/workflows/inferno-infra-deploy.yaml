name: 'Inferno Infra (Terraform)'

# Infra here (infra/aws-impl) is largely established and deploys into the sparked AWS
# accounts, so it is NOT applied automatically. On PRs touching infra/** we run a
# read-only `terraform plan` and post it for review; `terraform apply` happens ONLY via
# a manual workflow_dispatch (after the plan has been reviewed — ideally also run/tested
# locally first).

on:
  pull_request:
    branches:
      - master
    paths:
      - 'infra/**'
      - '.github/workflows/inferno-infra-deploy.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to plan and apply'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write       # request the OIDC JWT for AWS
  contents: read        # actions/checkout
  pull-requests: write  # post the plan comment

env:
  TF_WORKING_DIR: ./infra/aws-impl
  TF_VERSION: 1.11.4
  AWS_ROLE: arn:aws:iam::471112546300:role/inferno-github-actions-eks-role
  AWS_REGION: ap-southeast-2

jobs:
  plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}
      environment: ${{ steps.set_env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # Manual runs target the chosen environment; PRs target prod (the master-destined
      # env) so reviewers see the prod impact of the change.
      - name: Resolve environment
        id: set_env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -upgrade \
            -backend-config="bucket=examplebucket-fhir-aws" \
            -backend-config="region=ap-southeast-2" \
            -backend-config="key=infra/inferno/au-fhir-inferno-${{ steps.set_env.outputs.environment }}.tfstate"

      - name: Terraform Format
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # exit 0 = no changes, 1 = error, 2 = pending changes
      - name: Terraform Plan
        id: tf-plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          export exitcode=0
          terraform plan -var-file="tfvars/${{ steps.set_env.outputs.environment }}.tfvars" -detailed-exitcode -no-color -out main.tfplan || export exitcode=$?
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          if [ $exitcode -eq 1 ]; then
            echo "Terraform Plan Failed!"
            exit 1
          fi

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/main.tfplan

      - name: Create string output
        id: tf-plan-string
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          TERRAFORM_PLAN=$(terraform show -no-color main.tfplan)
          delimiter="$(openssl rand -hex 8)"
          {
            echo "summary<<${delimiter}"
            echo "## Terraform Plan (${{ steps.set_env.outputs.environment }})"
            echo "<details><summary>Click to expand</summary>"
            echo ""
            echo '```terraform'
            echo "$TERRAFORM_PLAN"
            echo '```'
            echo "</details>"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish plan to job summary
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
        run: echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `${process.env.SUMMARY}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })

  apply:
    name: 'Terraform Apply'
    # Apply ONLY on a manual dispatch, and only when the plan found changes.
    # Never on push or PR — no auto-apply.
    if: github.event_name == 'workflow_dispatch' && needs.plan.outputs.tfplanExitCode == 2
    runs-on: ubuntu-latest
    needs: [plan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -upgrade \
            -backend-config="bucket=examplebucket-fhir-aws" \
            -backend-config="region=ap-southeast-2" \
            -backend-config="key=infra/inferno/au-fhir-inferno-${{ needs.plan.outputs.environment }}.tfstate"

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve main.tfplan
