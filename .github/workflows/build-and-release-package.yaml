# Trunk build + release. master is the single long-lived branch (trunk):
#   branch → PR → master → auto-deploy to staging → prod-promotion PR → prod.
# Every push to master builds ONE released-flavour image (Gemfile + web:generate_prod);
# staging and prod run that same artifact (build once, deploy many). Bleeding-edge /
# unreleased kit work lives in preview environments (Gemfile.dev), not a persistent branch.
name: Build and Release Inferno and Nginx Images

on:
  push:
    branches:
      - master            # the trunk
    paths-ignore:         # config-only pushes (image-tag write-backs, docs) must not rebuild
      - 'infra/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    # Preview images for `preview`-labelled PRs (any base). PR quality gating lives in
    # quality-control.yaml; this workflow's only PR job is building preview images.
    types: [opened, synchronize, reopened, labeled]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    # Build on: any push to the trunk; OR a PR carrying the `preview` label.
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'preview')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set environment from event
        id: config
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && \
             [ "${{ contains(github.event.pull_request.labels.*.name, 'preview') }}" = "true" ]; then
            # Preview: dev-flavoured (Gemfile.dev), tagged by PR head SHA.
            echo "environment=pr" >> $GITHUB_OUTPUT
            echo "rake_task=web:generate_dev" >> $GITHUB_OUTPUT
            echo "bundle_gemfile=Gemfile.dev" >> $GITHUB_OUTPUT
            echo "image_sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "app_tag=${{ github.event.pull_request.head.sha }}-pr" >> $GITHUB_OUTPUT
            echo "nginx_tag=${{ github.event.pull_request.head.sha }}-nginx-pr" >> $GITHUB_OUTPUT
            echo "use_dev_env=true" >> $GITHUB_OUTPUT
            echo "BUNDLE_GEMFILE=$GITHUB_WORKSPACE/Gemfile.dev" >> $GITHUB_ENV
          else
            # Trunk (push to master): build ONCE, released flavour. Staging + prod run this
            # same artifact (no -dev/-prod split — build once, deploy many).
            echo "environment=trunk" >> $GITHUB_OUTPUT
            echo "rake_task=web:generate_prod" >> $GITHUB_OUTPUT
            echo "bundle_gemfile=Gemfile" >> $GITHUB_OUTPUT
            echo "image_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "app_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "nginx_tag=${{ github.sha }}-nginx" >> $GITHUB_OUTPUT
            echo "use_dev_env=false" >> $GITHUB_OUTPUT
            echo "BUNDLE_GEMFILE=$GITHUB_WORKSPACE/Gemfile" >> $GITHUB_ENV
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'

      - name: Install dependencies
        run: bundle install

      - name: Use dev environment file
        if: steps.config.outputs.use_dev_env == 'true'
        run: cp .env.development .env

      - name: Generate static content
        run: bundle exec rake ${{ steps.config.outputs.rake_task }}

      - name: Log in to Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          build-args: |
            BUNDLE_GEMFILE=${{ steps.config.outputs.bundle_gemfile }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.app_tag }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./nginx.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.nginx_tag }}

      # --- Trunk only (push to master): open the prod promotion PR ---
      # Staging auto-deploys via ArgoCD Image Updater (in sparked-argo): it watches ghcr
      # for the newest master build and writes the tag to apps/inferno-dev/image-values.yaml
      # in that repo, which the inferno-dev Application consumes. So this workflow no longer
      # writes back to master at all — nothing here pushes to the trunk. Prod stays a PR.

      # Prod promotion: push the SAME artifact's tags to a branch and surface a one-click
      # PR link whose body is PREFILLED with a changelog + risk flags (deps / app / chart),
      # diffed via the compare API between the SHA prod runs now and this build. Merging the
      # PR = the prod release (human gate). ArgoCD (inferno-prod, targetRevision: master)
      # syncs prod on merge. Prefill (vs auto-opening the PR) avoids needing "Actions can
      # create PRs" AND keeps the PR human-authored so quality-control still runs on it.
      - name: Prepare prod-promotion PR (changelog + risk flags)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.app_tag }}"
          NGINX="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.nginx_tag }}"
          BRANCH="promote/prod-${GITHUB_SHA}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          # The SHA prod runs now = the image tag in values-prod.yaml BEFORE we bump it
          # (the staging step above reset the tree to the current master tip).
          PROD_SHA=$(grep -m1 'imageUrl:' infra/helm/inferno/values-prod.yaml | sed -E 's#.*:([0-9a-f]{7,40}).*#\1#' || true)

          # Diff "what prod runs now" against this build via the compare API — works on a
          # shallow checkout, no deep clone needed. Build a changelog (drop merge/chore
          # noise, cap 40) and risk flags from the changed files.
          CMP=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${PROD_SHA}...${GITHUB_SHA}" 2>/dev/null || echo '{}')
          CHANGELOG=$(printf '%s' "$CMP" | jq -r '
            [.commits[]?.commit.message | split("\n")[0]
             | select(test("skip ci|promote prod|^Merge pull request|^Merge branch";"i")|not)] as $a
            | ($a[0:40] | map("- "+.) | join("\n"))
              + (if ($a|length)>40 then "\n- …and \(($a|length)-40) more (see run summary)" else "" end)')
          [ -z "$CHANGELOG" ] && CHANGELOG="- (could not compute commit range from ${PROD_SHA:-unknown})"
          FILES=$(printf '%s' "$CMP" | jq -r '.files[]?.filename')
          flag() { printf '%s\n' "$FILES" | grep -qE "$1" && echo '⚠️ CHANGED' || echo 'unchanged'; }
          DEPS=$(flag '^Gemfile\.lock$')
          APP_FLAG=$(flag '^(web|lib|app)/|\.rb$')
          # Chart = templates / base values.yaml / Chart.*, NOT the per-env values-{dev,prod}.yaml
          # (those are just image-tag write-backs/promotions and would otherwise always trip).
          CHART=$(flag '^infra/helm/inferno/(templates/|values\.yaml|Chart\.)')

          # Build the promotion branch (the actual values-prod.yaml image bump).
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          sed -i "s|imageUrl:.*|imageUrl: ${APP}|" infra/helm/inferno/values-prod.yaml
          sed -i "s|platformImageUri:.*|platformImageUri: ${NGINX}|" infra/helm/inferno/values-prod.yaml
          git commit -am "chore: promote prod to ${GITHUB_SHA}"
          git push --force-with-lease origin "$BRANCH"

          # Assemble the PR body, then prefill it into the one-click compare link.
          BODY_FILE="${RUNNER_TEMP}/pr-body.md"
          {
            echo "Promote prod \`${PROD_SHA:0:7}\` → \`${GITHUB_SHA:0:7}\` — staging already runs this exact artifact."
            echo ""
            echo "## Risk flags"
            echo "- Dependencies / test kits (\`Gemfile.lock\`): **${DEPS}**"
            echo "- App code / static site (\`web/\`, \`lib/\`): **${APP_FLAG}**"
            echo "- Helm chart (\`infra/**\`): **${CHART}** — already synced to prod via ArgoCD (informational)"
            echo ""
            echo "## Changelog since current prod (\`${PROD_SHA:0:7}\`)"
            echo "${CHANGELOG}"
            echo ""
            echo "Full code diff: ${REPO_URL}/compare/${PROD_SHA}...${GITHUB_SHA}"
            echo ""
            echo "- app:   \`${APP}\`"
            echo "- nginx: \`${NGINX}\`"
          } > "$BODY_FILE"

          TITLE=$(printf 'Promote prod → %s' "${GITHUB_SHA:0:7}" | jq -sRr @uri)
          BODY=$(jq -sRr @uri < "$BODY_FILE")
          LINK="${REPO_URL}/compare/master...${BRANCH}?expand=1&title=${TITLE}&body=${BODY}"
          {
            echo "## 🚀 Prod promotion ready"
            echo ""
            echo "**[Open the promotion PR — prefilled with changelog + risk flags](${LINK})**"
            echo ""
            echo "Merging it releases \`${GITHUB_SHA:0:7}\` to prod (the human gate)."
            echo ""
            echo "- app:   \`${APP}\`"
            echo "- nginx: \`${NGINX}\`"
            echo ""
            echo "<details><summary>PR body preview</summary>"
            echo ""
            cat "$BODY_FILE"
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
