name: Build and Release Inferno and Nginx Images

on:
  push:
    branches:
      - master
      - prod
      - development
  pull_request:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Serialise runs per branch so the dev image commit-back cannot race a concurrent
# push (avoids non-fast-forward push failures). Do not cancel in-progress builds —
# they may be mid image push.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment from branch
        id: config
        run: |
          if [ "$GITHUB_REF" = "refs/heads/development" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "rake_task=web:generate_dev" >> $GITHUB_OUTPUT
            echo "bundle_gemfile=Gemfile.dev" >> $GITHUB_OUTPUT
            echo "BUNDLE_GEMFILE=$GITHUB_WORKSPACE/Gemfile.dev" >> $GITHUB_ENV
          else
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "rake_task=web:generate_prod" >> $GITHUB_OUTPUT
            echo "bundle_gemfile=Gemfile" >> $GITHUB_OUTPUT
            echo "BUNDLE_GEMFILE=$GITHUB_WORKSPACE/Gemfile" >> $GITHUB_ENV
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'

      - name: Install dependencies
        run: bundle install

      - name: Use dev environment file
        if: github.ref == 'refs/heads/development'
        run: cp .env.development .env

      - name: Generate static content
        run: bundle exec rake ${{ steps.config.outputs.rake_task }}

      - name: Log in to Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push app image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          build-args: |
            BUNDLE_GEMFILE=${{ steps.config.outputs.bundle_gemfile }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ steps.config.outputs.environment }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./nginx.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-nginx-${{ steps.config.outputs.environment }}

      - name: Update image tags in values-dev.yaml
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        run: |
          sed -i "s|imageUrl:.*|imageUrl: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ steps.config.outputs.environment }}|" infra/helm/inferno/values-dev.yaml
          sed -i "s|platformImageUri:.*|platformImageUri: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-nginx-${{ steps.config.outputs.environment }}|" infra/helm/inferno/values-dev.yaml

      - name: Commit and push updated image tags
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/inferno/values-dev.yaml
          git commit -m "chore: update dev image to ${{ github.sha }} [skip ci]"
          git push origin development

      # Prod is promoted via a reviewed PR (not a direct commit): merging the PR is the
      # release. ArgoCD (sparked-argo, targetRevision: master) syncs the new tags to
      # prod-inferno on merge.
      - name: Update image tags in values-prod.yaml
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: |
          sed -i "s|imageUrl:.*|imageUrl: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ steps.config.outputs.environment }}|" infra/helm/inferno/values-prod.yaml
          sed -i "s|platformImageUri:.*|platformImageUri: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-nginx-${{ steps.config.outputs.environment }}|" infra/helm/inferno/values-prod.yaml

      - name: Open prod promotion PR
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: master
          branch: promote/prod-${{ github.sha }}
          add-paths: infra/helm/inferno/values-prod.yaml
          commit-message: "chore: promote prod image to ${{ github.sha }}"
          title: "Promote prod image to ${{ github.sha }}"
          body: |
            Automated production image promotion. Merging this PR is the prod release —
            ArgoCD (sparked-argo, `targetRevision: master`) syncs the new tags to
            `prod-inferno` → https://inferno.hl7.org.au.

            Built from `${{ github.sha }}` on `master`:
            - app:   `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-prod`
            - nginx: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-nginx-prod`
          labels: prod-promotion
          delete-branch: true
